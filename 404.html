  <script>
    (function() {
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;

      // Squarespace commerce & checkout paths → redirect to Squarespace
      if (path.indexOf('/commerce/') === 0 || path.indexOf('/checkout/') === 0) {
        window.location.replace(
          'https://alwaysfilmlab.squarespace.com' + path + search + hash
        );
        return;
      }
    })();
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:      #E8522A;
      --orange-dark: #C43E1A;
      --dark:        #111010;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: #fff;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;

    .container { max-width: 520px; width: 100%; }

    .logo {

      margin: 0 auto 32px;
      border-radius: 14px;
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(32px, 6vw, 48px);
      font-weight: 900;
      margin-bottom: 16px;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
      color: rgba(255,255,255,.6);
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      padding: 14px 32px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      text-decoration: none;
      background: var(--orange);
      color: #fff;
      box-shadow: 0 6px 24px rgba(232,82,42,.3);
      transition: background .2s, transform .15s;
    }

    .btn:hover {
      background: var(--orange-dark);
      transform: translateY(-2px);
    }
  </style>
